version: '3.8'
services:
  postgres:
    image: postgres:17-alpine
    container_name: apirestequipment-db
    environment:
      POSTGRES_USER: equipment
      POSTGRES_PASSWORD: equipment
      POSTGRES_DB: apirestequipment
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U equipment -d apirestequipment']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
